# Routes @pulse mentions in GitHub comments to the Dispatch Router Lambda.
# Does NOT intercept @claude mentions — those are handled by claude-code.yml.

name: Agent Dispatch

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  dispatch:
    if: |
      contains(github.event.comment.body, '@pulse') ||
      contains(github.event.comment.body, '@greenflag') ||
      contains(github.event.comment.body, '@lookout') ||
      contains(github.event.comment.body, '@inkwell')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::200608916304:role/GitHubActions-ClaudeCode-Bedrock
          aws-region: us-west-2

      - name: Invoke Dispatch Router
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
        run: |
          jq -n \
            --arg source "github" \
            --arg trigger_type "comment_mention" \
            --arg body "$COMMENT_BODY" \
            --arg sender "$COMMENT_USER" \
            --arg repo "$REPO" \
            --arg issue_number "$ISSUE_NUMBER" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg issue_body "$ISSUE_BODY" \
            '{
              source: $source,
              trigger_type: $trigger_type,
              body: $body,
              sender: $sender,
              context: {
                repo: $repo,
                issue_number: $issue_number,
                issue_title: $issue_title,
                issue_body: $issue_body
              }
            }' > /tmp/payload.json

          aws lambda invoke \
            --function-name dispatch-router-dev \
            --invocation-type Event \
            --payload fileb:///tmp/payload.json \
            --region us-west-2 \
            response.json

          echo "Dispatched to agent fleet"
          cat response.json
