# Claude Code Review — runs on every PR and posts inline review comments.
#
# Reviews the diff against the project's Architectural Decision Records
# (ADRs) in `adrs/`, plus general code quality / correctness / security /
# test coverage. Complements the @adr fleet agent: this runs automatically
# on every PR, while @adr is on-demand and scopes its review to the linked
# issue's ADR labels when one exists.

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  claude-review:
    # Skip draft PRs and autogenerated dependency bumps
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::200608916304:role/GitHubActions-ClaudeCode-Bedrock
          aws-region: us-east-1

      - uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          track_progress: true
          claude_args: |
            --model us.anthropic.claude-opus-4-6-v1
            --allowedTools mcp__github_inline_comment__create_inline_comment
          prompt: |
            You are reviewing a pull request on `${{ github.repository }}` (PR #${{ github.event.pull_request.number }}).

            ## Primary review axis: ADR alignment

            This repo keeps Architectural Decision Records under `adrs/`. Before commenting on anything else:

            1. **Read the `adrs/` directory.** Each file encodes a decision the team has already made. Cross-reference the diff against the decisions that apply.
            2. **For each ADR that governs something in the diff**, check the change against its Decision section:
               - If the diff *follows* the ADR, don't comment — silence is signal.
               - If the diff *contradicts* or *sidesteps* the ADR without mentioning it, raise it as a review comment on the relevant hunk. Name the ADR by number and cite the specific section that's in tension.
               - If the diff *extends* work the ADR governs but raises a new decision point the ADR doesn't cover, note it as a suggestion — maybe this PR needs a new ADR, maybe the ADR needs an amendment.
            3. **Ignore superseded / deprecated ADRs** unless the diff is reviving behavior they were written against. In that case, name the successor ADR.

            If the PR body contains `Closes #N` or similar, prioritize ADRs tagged on issue #N (those are the authoritative scope for this work) over ADRs you infer from the diff alone.

            ## Secondary review axes (standard code review)

            After ADR alignment, also look at:
            - **Correctness** — logic errors, off-by-one, unhandled edge cases, race conditions
            - **Security** — injection, auth/authz gaps, secret handling, input validation at trust boundaries
            - **Test coverage** — new behavior without tests, tests that don't actually exercise the new behavior, flaky patterns
            - **Code quality** — readability, dead code, duplicated logic that should be shared, names that mislead

            ## Output format

            Post inline review comments on specific diff hunks where you have concrete feedback. Keep each comment to one finding; don't bundle.

            When you end the review, post a single summary comment with:
            - Number of ADR-alignment findings
            - Number of other findings (grouped by axis)
            - A one-line verdict: aligned / minor concerns / needs attention

            If the diff is trivial (docs-only, CI config, version bumps) or you find no issues, post a single summary comment saying so and stop. Don't invent feedback to fill space.

            ## Rules

            - NEVER approve or reject the PR. Your job is to review; humans gate merges.
            - NEVER push commits to the PR branch.
            - Cite specifics — file path, line range, exact ADR section. No vague "consider refactoring this."
            - Be direct. Reviewers should be able to act on each comment without reading between the lines.
